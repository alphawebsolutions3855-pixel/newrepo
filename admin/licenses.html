<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Alpha Automation | Licenses</title>
  <style>
    :root{--accent:#c20000;--bg:#fff;--muted:#666}
    body{font-family:Inter,system-ui,Arial;margin:0;background:linear-gradient(180deg,#fff,#f9f2f2)}
    .container{max-width:1100px;margin:28px auto;padding:20px}
    header{display:flex;justify-content:space-between;align-items:center}
    h1{color:var(--accent);margin:0}
    .card{background:#fff;border-radius:16px;padding:18px;margin-top:18px;border:1px solid #f0eaea}
    .btn{background:var(--accent);color:#fff;padding:10px 14px;border-radius:12px;border:none;cursor:pointer}
    pre{background:#fff3f3;padding:12px;border-radius:10px;border:1px solid #f4d6d6}
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>Licenses</h1>
      <div><a href="/admin/dashboard">Back to dashboard</a></div>
    </header>

    <div class="card">
      <div style="display:flex;gap:12px;align-items:center">
        <button id="gen" class="btn">Generate License</button>
        <input id="pkg" placeholder="package (eg: pro)" />
      </div>
      <div style="margin-top:14px">
        <pre id="out">Loading...</pre>
      </div>
    </div>
  </div>
  <script>
    async function refresh(){
      const r = await fetch('/admin/licenses', {credentials:'include'});
      const j = r.ok? await r.json(): {error:'unauthorized'};
      document.getElementById('out').textContent = JSON.stringify(j, null, 2);
    }
    document.getElementById('gen').addEventListener('click', async ()=>{
      const pkg = document.getElementById('pkg').value || 'pro';
      const r = await fetch('/admin/licenses/generate', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({pkg})});
      await refresh();
    });
    refresh();
  </script>
</body>
</html>
