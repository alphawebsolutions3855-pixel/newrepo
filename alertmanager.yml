global:
  resolve_timeout: 5m
route:
  receiver: 'team-email'
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 12h
  routes:
    - match:
        alertname: HighFailedPublishes
      receiver: 'team-email'
receivers:
  - name: 'team-email'
    email_configs:
      - to: 'alerts@example.com' # set to your email
        from: 'alertmanager@example.com'
        smarthost: 'smtp.example.com:587'
        auth_username: 'smtp-user'
        auth_identity: 'smtp-user'
        auth_password: 'smtp-password'
  - name: 'slack-webhook'
    webhook_configs:
      - url: 'https://example.com/your-slack-webhook-url' # replace with your webhook URL
inhibit_rules: []
