name: Build Artifacts

on:
  push:
    branches:
      - main
  workflow_dispatch: {}

jobs:
  build_linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -r requirements.txt
      - name: Build Linux binary
        run: |
          pyinstaller --noconfirm --onefile --name alpha_automation_server_linux --add-data "admin:admin" server.py
      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: alpha_automation_server_linux
          path: dist/alpha_automation_server_linux

  build_windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
      - name: Install dependencies
        shell: powershell
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -r requirements.txt
      - name: Build Windows executable
        shell: powershell
        run: |
          pyinstaller --noconfirm --onefile --name alpha_automation_server_windows --add-data "admin;admin" server.py
      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: alpha_automation_server_windows
          path: dist/alpha_automation_server_windows.exe
